name: Publish Kubernetes volume Image

on:
    release:
        types: [published]
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    publish:
        name: Build and Publish Volume Image
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Prepare image name
              id: prep
              run: |
                  image="ghcr.io/${GITHUB_REPOSITORY}-volume"
                  image="$(echo "$image" | tr '[:upper:]' '[:lower:]')"
                  echo "image=$image" >> "$GITHUB_OUTPUT"

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ steps.prep.outputs.image }}
                  tags: |
                      type=ref,event=tag
                      type=sha,prefix=sha-
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile.volume
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      VERSION=${{ github.event.release.tag_name || github.ref_name }}
                      COMMIT=${{ github.sha }}
                      DATE=${{ github.event.release.published_at || github.run_id }}
